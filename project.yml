name: NoiseBar
options:
  bundleIdPrefix: design.reality.noisebar
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

targets:
  NoiseBar-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: macOS
      - path: Shared
    info:
      path: macOS/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: NoiseBar
        CFBundleName: NoiseBar
        NSHumanReadableCopyright: ""
    settings:
      base:
        PRODUCT_NAME: NoiseBar
        PRODUCT_BUNDLE_IDENTIFIER: design.reality.noisebar.mac
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: macOS/NoiseBar.entitlements
        GENERATE_INFOPLIST_FILE: NO

  NoiseBar-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iOS
      - path: Shared
    info:
      path: iOS/Info.plist
      properties:
        CFBundleDisplayName: NoiseBar
        CFBundleName: NoiseBar
        UIBackgroundModes: [audio]
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - target: NoiseBarWidget
    settings:
      base:
        PRODUCT_NAME: NoiseBar
        PRODUCT_BUNDLE_IDENTIFIER: design.reality.noisebar.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: iOS/NoiseBar.entitlements
        GENERATE_INFOPLIST_FILE: NO

  NoiseBarWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NoiseBarWidget
      - path: Shared/Models
    info:
      path: NoiseBarWidget/Info.plist
      properties:
        CFBundleDisplayName: NoiseBar
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_NAME: NoiseBarWidget
        PRODUCT_BUNDLE_IDENTIFIER: design.reality.noisebar.ios.widget
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: NoiseBarWidget/NoiseBarWidget.entitlements
        GENERATE_INFOPLIST_FILE: NO
